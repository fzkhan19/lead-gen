<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded dark background -->
  <rect width="32" height="32" rx="8" fill="#02040a" />
  
  <!-- Outer glowing orbital/radar circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-dasharray="4, 2" opacity="0.4" />
  <circle cx="16" cy="16" r="8" fill="none" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.2" />

  <!-- Connecting network line -->
  <line x1="8" y1="24" x2="16" y2="16" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <line x1="24" y1="24" x2="16" y2="16" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <line x1="16" y1="8" x2="16" y2="16" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />

  <!-- Network Nodes -->
  <circle cx="8" cy="24" r="2.5" fill="#030712" stroke="#06b6d4" stroke-width="1.5" />
  <circle cx="24" cy="24" r="2.5" fill="#030712" stroke="#06b6d4" stroke-width="1.5" />

  <!-- Central Target / AI Node with glowing gradient -->
  <circle cx="16" cy="16" r="4.5" fill="url(#cyanGrad)" />
  <circle cx="16" cy="16" r="2" fill="#ffffff" />
  
  <!-- Upper Node -->
  <circle cx="16" cy="8" r="2.5" fill="#030712" stroke="#06b6d4" stroke-width="1.5" />

  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
  </defs>
</svg>
